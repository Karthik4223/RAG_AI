<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Flow Visualizer | Gemini AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .input-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        textarea,
        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus,
        input:focus {
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-size: 1.1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Animation Flow */
        .visualizer-stage {
            height: 400px;
            position: relative;
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: none;
            /* Shown toggle */
        }

        .step-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
            text-align: center;
        }

        .node {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .node i {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .node-input {
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            background: #3b82f6;
            border: 4px solid #93c5fd;
        }

        .node-chunker {
            left: 40%;
            top: 50%;
            transform: translateY(-50%);
            background: #8b5cf6;
            border: 4px solid #c4b5fd;
            opacity: 0;
        }

        .node-google {
            left: 70%;
            top: 50%;
            transform: translateY(-50%);
            background: #10b981;
            border: 4px solid #6ee7b7;
            opacity: 0;
        }

        .node-db {
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            background: #f59e0b;
            border: 4px solid #fcd34d;
            opacity: 0;
        }

        .data-packet {
            position: absolute;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            color: #0f172a;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            display: none;
        }

        .vector-visual {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            width: 80px;
            justify-content: center;
        }

        .vector-bit {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 1px;
            animation: pulse-bit 1s infinite alternate;
        }

        @keyframes pulse-bit {
            from {
                opacity: 0.3;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        .connector {
            position: absolute;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            z-index: 1;
            top: 50%;
            transform: translateY(-50%);
        }

        .log-stream {
            margin-top: 1rem;
            background: #000;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #4ade80;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #1e293b;
        }

        .log-entry {
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Animation Classes */
        .fade-in {
            opacity: 1 !important;
            transition: opacity 1s;
        }

        .path-active {
            background: linear-gradient(to right, transparent, var(--accent), transparent) !important;
            background-size: 200% 100% !important;
            animation: flow 2s infinite linear !important;
        }

        @keyframes flow {
            from {
                background-position: 200% 0;
            }

            to {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <h1>RAG Ingestion Journey</h1>
    <p style="color: #94a3b8; margin-bottom: 2rem;">Watch your text transform into a high-dimensional vector</p>

    <div class="container">
        <div class="input-section" id="form-container">
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="e.g. Ring Connection Guide">
            </div>
            <div class="input-group">
                <label>Content</label>
                <textarea id="content" rows="6" placeholder="Paste your text here..."></textarea>
            </div>
            <button onclick="startVisualization()">Begin Transformation</button>
        </div>

        <div class="visualizer-stage" id="stage">
            <div class="step-label" id="step-name">Initializing...</div>

            <div class="node node-input" id="node-1">
                <span>Input</span>
            </div>

            <div class="connector" style="left: 20%; width: 22%;"></div>

            <div class="node node-chunker" id="node-2">
                <span>Semantic Chunker</span>
            </div>

            <div class="connector" style="left: 50%; width: 22%;"></div>

            <div class="node node-google" id="node-3">
                <span>Gemini Embedding</span>
            </div>

            <div class="connector" style="left: 80%; width: 14%;"></div>

            <div class="node node-db" id="node-4">
                <span>Chroma DB</span>
            </div>

            <div id="packet" class="data-packet">Content</div>
        </div>

        <div class="log-stream" id="logs">
            <div class="log-entry" style="color: #94a3b8;">System ready. Waiting for user input...</div>
        </div>
    </div>

    <script>
        const logs = document.getElementById('logs');
        const packet = document.getElementById('packet');

        function addLog(text, color = '#4ade80') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = color;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            logs.prepend(entry);
        }

        async function startVisualization() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!title || !content) {
                alert("Please fill in both title and content!");
                return;
            }

            document.getElementById('form-container').style.display = 'none';
            document.getElementById('stage').style.display = 'block';

            const stepName = document.getElementById('step-name');

            // --- STEP 1: INPUT ---
            stepName.innerText = "Step 1: Receiving Raw Input";
            addLog(`Received raw text: "${title}" (${content.length} chars)`);
            packet.innerText = title;
            packet.style.display = 'block';
            packet.style.left = '15%';
            packet.style.top = '50%';

            await sleep(1500);

            // --- STEP 2: SEMANTIC CHUNKING ---
            stepName.innerText = "Step 2: Semantic Chunking";
            addLog("Analyzing document structure...");

            // Move packet to chunker
            animate(packet, { left: '42%' }, 1000);
            await sleep(1000);

            document.getElementById('node-2').classList.add('fade-in');
            addLog("Gemini identifying topic boundaries...");
            await sleep(1000);

            packet.innerText = "...breaking into chunks...";
            packet.style.background = '#8b5cf6';
            packet.style.color = 'white';
            addLog("Semantic break found. Split text into 1 logical chunk.");
            await sleep(1500);

            // --- STEP 3: EMBEDDING ---
            stepName.innerText = "Step 3: Vector Generation (Google API)";
            addLog("Sending chunks to text-embedding-004...");

            animate(packet, { left: '72%' }, 1000);
            await sleep(1000);

            document.getElementById('node-3').classList.add('fade-in');
            packet.innerHTML = '';
            packet.classList.add('vector-visual');
            for (let i = 0; i < 12; i++) {
                packet.innerHTML += '<div class="vector-bit"></div>';
            }

            addLog("Translating human language into 768-dimensional math...");
            await sleep(2000);

            // --- STEP 4: STORAGE ---
            stepName.innerText = "Step 4: Persistent Indexing";
            addLog("Calculating metadata for storage...");

            animate(packet, { left: '90%', opacity: 0 }, 1000);
            await sleep(800);

            document.getElementById('node-4').classList.add('fade-in');
            addLog("Stored in ChromaDB (SQLite + HNSW Index).", '#f59e0b');
            addLog("SUCCESS: Knowledge Base Updated.", '#fbbf24');

            await sleep(1000);
            stepName.innerText = "Processing Complete!";

            const btn = document.createElement('button');
            btn.innerText = "Add Another Document";
            btn.style.marginTop = "20px";
            btn.onclick = () => location.reload();
            document.querySelector('.container').appendChild(btn);
        }

        function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

        function animate(el, props, duration) {
            el.style.transition = `all ${duration}ms cubic-bezier(0.4, 0, 0.2, 1)`;
            Object.assign(el.style, props);
        }

    </script>
</body>

</html>
